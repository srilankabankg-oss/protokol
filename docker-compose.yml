version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: protokol-postgres
    environment:
      POSTGRES_DB: protokol
      POSTGRES_USER: protokol
      POSTGRES_PASSWORD: protokol_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protokol -d protokol"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: protokol-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: protokol-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://protokol:protokol_secret@postgres:5432/protokol
      DATABASE_URL_SYNC: postgresql://protokol:protokol_secret@postgres:5432/protokol
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

volumes:
  postgres_data: